name: Android CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/wrapper-validation@v4
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit tests
        run: ./gradlew test
      - name: Lint
        run: ./gradlew lint
      - name: Debug APK
        run: ./gradlew assembleDebug
